version: v2
clean: true
plugins:
  # @bufbuild/protoc-gen-es v2 emits both messages and service descriptors;
  # Connect-ES v2 consumes those descriptors directly via createClient — no
  # separate protoc-gen-connect-es plugin needed (that plugin stayed on v1).
  - local: protoc-gen-es
    out: src/pb
    opt:
      - target=ts
      - import_extension=js
inputs:
  # Harmonograf's own protos. telemetry.proto / frontend.proto import
  # goldfive/v1/events.proto, so we also include the goldfive proto tree
  # below. The vendor-proto/ directory is a symlink into the installed
  # goldfive package, populated by `make proto-ts` so the path tracks
  # the editable dependency and is never committed.
  - directory: ../proto
  - directory: ./vendor-proto
