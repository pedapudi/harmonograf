// Harmonograf v1 — telemetry channel.
//
// StreamTelemetry is the high-volume bidirectional stream from agent to
// server. Spans, payload chunks, and control acks all flow upstream on
// this RPC. The downstream is reserved for handshake (Welcome), payload
// re-requests, and flow-control hints — NOT for delivering control events.
// Control delivery has its own RPC (control.proto SubscribeControl).
//
// Why split telemetry from control? See docs/design/01 §4.2.1 — separate
// flow control, independent reconnect, and folding acks back into telemetry
// avoids a third RPC while preserving happens-before ordering.

syntax = "proto3";

package harmonograf.v1;

import "google/protobuf/timestamp.proto";
import "harmonograf/v1/types.proto";
import "goldfive/v1/control.proto";
import "goldfive/v1/events.proto";

option go_package = "github.com/pedapudi/harmonograf/gen/harmonograf/v1;harmonografv1";

// ---------------------------------------------------------------------------
// Upstream messages (client → server)
// ---------------------------------------------------------------------------

// First message on every StreamTelemetry. The server replies with Welcome.
//
// session_id may be empty — the server will auto-create one and return the
// assigned id in Welcome. If session_id is provided and unknown, the server
// creates it on the fly (resolved decision A).
message Hello {
  string agent_id = 1;
  string session_id = 2;
  string name = 3;
  Framework framework = 4;
  string framework_version = 5;
  repeated Capability capabilities = 6;
  map<string, string> metadata = 7;
  // Optional: last span_id the server confirmed before disconnect, used by
  // the client to drive replay-from on reconnect.
  string resume_token = 8;
  // Title and metadata to set on the session if this client is the first
  // to create it. Ignored if joining an existing session.
  string session_title = 9;
}

// Lifecycle messages — start/update/end of a span.
//
// SpanStart carries the full span minus end_time. SpanUpdate carries
// only the fields that changed. SpanEnd carries the final state.
message SpanStart {
  Span span = 1;
}

message SpanUpdate {
  string span_id = 1;
  // Attribute deltas. Keys not present in the map are unchanged. To clear
  // a key, send an AttributeValue with no oneof set.
  map<string, AttributeValue> attributes = 2;
  // Optional status transition.
  SpanStatus status = 3;
  // Optional payload references added mid-span (e.g., a streaming LLM
  // attaching its completion as it arrives).
  repeated PayloadRef payload_refs = 4;
}

message SpanEnd {
  string span_id = 1;
  google.protobuf.Timestamp end_time = 2;
  SpanStatus status = 3;
  ErrorInfo error = 4;
  // Final attribute snapshot — additive, same semantics as SpanUpdate.
  map<string, AttributeValue> attributes = 5;
  repeated PayloadRef payload_refs = 6;
}

// PayloadUpload streams blob bytes in chunks of up to 256 KiB. The client
// computes the digest locally and ships the PayloadRef in SpanStart/Update/End
// before the bytes arrive — the timeline updates without waiting for the
// upload. Multiple PayloadUploads for distinct digests interleave freely
// on the same stream.
message PayloadUpload {
  string digest = 1;
  int64 total_size = 2;
  string mime = 3;
  bytes chunk = 4;
  bool last = 5;
  // Set true on the last chunk if the client gave up uploading (eviction).
  // Server records the digest as permanently unavailable.
  bool evicted = 6;
}

// Periodic heartbeat (default every 5s). Carries the client's buffer
// stats so the frontend can show health in the agent row header.
message Heartbeat {
  int64 buffered_events = 1;
  int64 dropped_events = 2;
  int64 dropped_spans_critical = 3;
  int64 buffered_payload_bytes = 4;
  int64 payloads_evicted = 5;
  double cpu_self_pct = 6;
  google.protobuf.Timestamp client_time = 7;

  // Monotonically increasing counter incremented on every meaningful action
  // (span start/update/end, tool call, LLM call, etc.). The server compares
  // successive heartbeats: if progress_counter has not changed for
  // STUCK_THRESHOLD consecutive heartbeats while an INVOCATION span is
  // RUNNING, the agent is declared stuck and the frontend is notified.
  int64 progress_counter = 8;

  // One-sentence description of what the agent is currently doing, suitable
  // for display in the popover summary and graph view tooltip. Set by the
  // client adapter (e.g. "Calling tool search_web with query: climate change").
  // Empty string means no current activity description is available.
  string current_activity = 9;

  // Most recent snapshot of the LLM context window for this agent. The
  // client adapter observes each model call (ADK before/after_model_callback)
  // and updates these fields; the heartbeat loop ships whatever is current.
  // Both fields default to 0 which is treated as "not populated" — the
  // server ignores zero-valued samples on ingest rather than persisting them.
  int64 context_window_tokens = 10;
  int64 context_window_limit_tokens = 11;
}

// Graceful client shutdown — server marks the agent DISCONNECTED without
// waiting for the heartbeat timeout.
message Goodbye {
  string reason = 1;
}

// TelemetryUp is the upstream oneof that StreamTelemetry takes.
message TelemetryUp {
  // Reserved: were TaskPlan task_plan = 9 / UpdatedTaskStatus
  // task_status_update = 10 before the goldfive migration (issue #2).
  // Plan + task state now ride inside goldfive_event.
  reserved 9, 10;
  // Reserved: was a placeholder
  // ``harmonograf.v1.InvocationCancelled invocation_cancelled = 12``
  // added in PR #187 to ingest goldfive's dict-envelope cancel event
  // before the upstream proto landed. Removed in PR (Wave 2 / A8) once
  // goldfive#262 promoted the event to a typed
  // ``goldfive.v1.InvocationCancelled`` variant on the existing
  // ``goldfive_event`` envelope.
  reserved 12;
  oneof msg {
    Hello hello = 1;
    SpanStart span_start = 2;
    SpanUpdate span_update = 3;
    SpanEnd span_end = 4;
    PayloadUpload payload = 5;
    Heartbeat heartbeat = 6;
    // Acks for ControlEvents received via SubscribeControl. Folded into
    // telemetry to preserve happens-before. Wire type is goldfive's —
    // see goldfive/v1/control.proto ControlAck.
    goldfive.v1.ControlAck control_ack = 7;
    Goodbye goodbye = 8;
    // Goldfive orchestration event. Carries the full goldfive Event
    // envelope (RunStarted, GoalDerived, PlanSubmitted, PlanRevised,
    // TaskStarted/Progress/Completed/Failed/Blocked/Cancelled,
    // DriftDetected, InvocationCancelled, RunCompleted, RunAborted).
    // Server ingest dispatches on the event's payload oneof; frontend
    // WatchSession fans it out as typed deltas.
    goldfive.v1.Event goldfive_event = 11;
    // Operator-observability events emitted by goldfive's steerer at
    // refine time (goldfive#264). ``RefineAttempted`` fires at the start
    // of every refine attempt (autonomous _handle_drift path AND the
    // goldfive-steer _promote_drift_to_steer path); ``RefineFailed``
    // fires when the attempt produces an unusable outcome (parse error,
    // validator rejection, LLM error). Successful attempts are reported
    // by the existing ``goldfive.v1.PlanRevised`` event. Each pair is
    // correlated by ``attempt_id`` so the harmonograf UI can merge a
    // ``RefineAttempted`` with its terminal ``PlanRevised`` /
    // ``RefineFailed`` into a single intervention row per attempt.
    //
    // Same dict→proto pattern as the pre-#190 InvocationCancelled
    // path: goldfive ships these as dict envelopes for forward-compat
    // (the proto promotion is tracked as goldfive Stream C #256), and
    // harmonograf materializes them at the client sink. When the
    // promotion lands, these slots collapse into the existing
    // ``goldfive_event`` envelope (matches the InvocationCancelled
    // migration in #190).
    RefineAttempted refine_attempted = 13;
    RefineFailed refine_failed = 14;
  }
}

// ---------------------------------------------------------------------------
// Operator-observability: refine attempt lifecycle (goldfive#264)
// ---------------------------------------------------------------------------

// Operator-facing record that goldfive started a refine attempt against
// a drift. Fires at the start of every refine call (both the autonomous
// ``DefaultSteerer._handle_drift`` path and the goldfive-steer
// ``_promote_drift_to_steer`` path). Pairs with exactly one of
// ``goldfive.v1.PlanRevised`` (success) / ``RefineFailed`` (failure)
// carrying the same ``attempt_id``.
//
// The harmonograf UI merges a ``RefineAttempted`` with its terminal
// counterpart into a single intervention row per attempt — see
// ``frontend/src/lib/interventions.ts::mergeRefineAttempts``.
//
// Wire shape mirrors the dict envelope goldfive emits verbatim so the
// sink's dict→proto conversion is a field-by-field copy. See
// ``goldfive/steerer.py::DefaultSteerer._emit_refine_attempted`` for the
// authoritative source.
message RefineAttempted {
  // Envelope metadata — same fields the goldfive dict envelope carries
  // alongside the payload.
  string run_id = 1;
  uint64 sequence = 2;
  string session_id = 3;
  google.protobuf.Timestamp emitted_at = 4;

  // UUID4 minted by goldfive at attempt start. Stable across the paired
  // ``RefineFailed`` / ``PlanRevised`` event so harmonograf can merge
  // the attempted row with its terminal row.
  string attempt_id = 5;
  // Cross-reference to the triggering ``DriftDetected.id`` (UUID4).
  string drift_id = 6;
  // Lowercase drift kind that triggered the refine — "off_topic",
  // "looping_reasoning", "user_steer", etc.
  string trigger_kind = 7;
  // Lowercase drift severity — "info" / "warning" / "critical".
  string trigger_severity = 8;
  // Task this refine targets, when known. Empty when the drift was
  // detected outside any single task scope.
  string current_task_id = 9;
  // Agent the cancelled invocation runs under. Bare on the goldfive
  // side; the harmonograf sink canonicalizes to ``<client>:<bare>``
  // (mirrors the rule applied to every other compound id).
  string current_agent_id = 10;
}

// Operator-facing record that a refine attempt produced an unusable
// outcome (parse error, validator rejection, LLM error). Crucially
// emitted WITHOUT bumping ``revision_index`` — the ``attempt_id``
// disambiguates the failure across otherwise-incrementing revisions.
//
// See ``goldfive/steerer.py::DefaultSteerer._emit_refine_failed``.
message RefineFailed {
  // Envelope metadata — same fields the goldfive dict envelope carries.
  string run_id = 1;
  uint64 sequence = 2;
  string session_id = 3;
  google.protobuf.Timestamp emitted_at = 4;

  // Correlation key with the paired ``RefineAttempted``. Always set.
  string attempt_id = 5;
  // Backlink to the triggering ``DriftDetected.id``. Always set
  // (goldfive emits the failure event with the originating drift's id).
  string drift_id = 6;
  string trigger_kind = 7;
  string trigger_severity = 8;
  // Coarse failure taxonomy:
  //   "parse_error"        — refine LLM returned bytes the parser
  //                          rejected (malformed JSON, missing fields).
  //   "validator_rejected" — parsed plan failed a downstream validator
  //                          (supersedes coverage, structural check).
  //   "llm_error"          — the refine LLM call itself errored.
  //   "other"              — anything else; ``detail`` carries context.
  // String not enum so adding a new failure kind is a drop-in change
  // on the goldfive side without a proto bump.
  string failure_kind = 9;
  // Short human-readable summary of the failure cause.
  string reason = 10;
  // Free-form longer payload (e.g. validator exception text). May be
  // empty when ``reason`` already says everything useful.
  string detail = 11;
  string current_task_id = 12;
  string current_agent_id = 13;
}

// ---------------------------------------------------------------------------
// Downstream messages (server → client)
// ---------------------------------------------------------------------------

// Sent in response to Hello. Carries the assigned session_id (which may
// equal what the client requested, or a freshly generated id) and a
// stream_id that uniquely identifies this telemetry stream within the
// agent_id. Multiple concurrent streams per agent_id are allowed; each
// gets a distinct stream_id.
message Welcome {
  bool accepted = 1;
  string assigned_session_id = 2;
  string assigned_stream_id = 3;
  google.protobuf.Timestamp server_time = 4;
  // Server feature flags / capability advertisements. Reserved for future
  // negotiation; v0 is always empty.
  map<string, string> flags = 5;
  // If accepted == false, why.
  string rejection_reason = 6;
}

// Server asks the client to re-upload a payload by digest, typically
// because the user opened a drawer for a span whose bytes never arrived.
message PayloadRequest {
  string digest = 1;
}

// Soft hint that the client should slow down or may resume. v0 ingest does
// not actually emit these — reserved for future use when the server starts
// shedding load itself.
message FlowControl {
  enum Action {
    ACTION_UNSPECIFIED = 0;
    ACTION_SLOW = 1;
    ACTION_RESUME = 2;
  }
  Action action = 1;
}

message ServerGoodbye {
  string reason = 1;
}

// TelemetryDown is the downstream oneof.
message TelemetryDown {
  oneof msg {
    Welcome welcome = 1;
    PayloadRequest payload_request = 2;
    FlowControl flow_control = 3;
    ServerGoodbye server_goodbye = 4;
  }
}
