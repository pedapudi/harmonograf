// Harmonograf v1 — frontend-facing RPC request/response messages.
//
// The UI talks to the server through these unary and server-streaming
// RPCs. Requests here are issued by the Gantt console, not by agents.
// The service declaration itself lives in service.proto so it can
// aggregate telemetry, control, and these RPCs under one gRPC service.
//
// See docs/design/01 §4.6 for the per-RPC semantics and docs/design/04
// §7 for the interactions that drive them.

syntax = "proto3";

package harmonograf.v1;

import "google/protobuf/timestamp.proto";
import "harmonograf/v1/types.proto";
import "goldfive/v1/control.proto";
import "goldfive/v1/events.proto";

option go_package = "github.com/pedapudi/harmonograf/gen/harmonograf/v1;harmonografv1";

// ---------------------------------------------------------------------------
// ListSessions
// ---------------------------------------------------------------------------

// Summary of a session for the picker. Cheap to build — does not load
// any spans.
message SessionSummary {
  string id = 1;
  string title = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp ended_at = 4;
  SessionStatus status = 5;
  int32 agent_count = 6;
  // Number of spans currently in AWAITING_HUMAN state across all agents
  // in this session. Drives the attention badge on the picker row.
  int32 attention_count = 7;
  google.protobuf.Timestamp last_activity = 8;
}

message ListSessionsRequest {
  // Optional filter on status. Omit to include all.
  SessionStatus status_filter = 1;
  // Free-text search over title and metadata values. Empty = no filter.
  string search = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message ListSessionsResponse {
  repeated SessionSummary sessions = 1;
  int32 total_count = 2;
}

// ---------------------------------------------------------------------------
// WatchSession
// ---------------------------------------------------------------------------

// Initial burst + live deltas for a session. The first messages in the
// stream carry the existing state (agents + spans in the requested
// window); after that the server pushes deltas as they arrive from
// telemetry.
message WatchSessionRequest {
  string session_id = 1;
  // Optional time window for the initial burst. If absent, server
  // picks a recent window (default: last 1 hour or the whole session,
  // whichever is smaller).
  google.protobuf.Timestamp window_start = 2;
  google.protobuf.Timestamp window_end = 3;
}

message SessionUpdate {
  // Reserved: were TaskPlan task_plan = 16 / UpdatedTaskStatus
  // updated_task_status = 17 before the goldfive migration (issue #2).
  // Plan + task deltas now ride on goldfive_event (field 19) instead,
  // carrying a goldfive.v1.Event so the wire is a straight passthrough
  // of whatever the orchestrator emitted.
  reserved 16, 17;
  oneof kind {
    // Initial burst messages. Multiple of each may be sent before the
    // first delta. A client knows the burst is done when it sees the
    // first delta (NewSpan/UpdatedSpan/EndedSpan/etc) OR receives an
    // explicit InitialBurstComplete.
    Session session = 1;
    Agent agent = 2;
    Span initial_span = 3;
    Annotation initial_annotation = 4;
    InitialBurstComplete burst_complete = 5;

    // Live deltas.
    NewSpan new_span = 6;
    UpdatedSpan updated_span = 7;
    EndedSpan ended_span = 8;
    NewAnnotation new_annotation = 9;
    AgentJoined agent_joined = 10;
    AgentLeft agent_left = 11;
    AgentStatusChanged agent_status_changed = 12;
    SessionEnded session_ended = 13;
    // Hint that the client should call GetPayload for a digest whose
    // summary was already delivered. Server emits these opportunistically
    // when the drawer-less client explicitly subscribes to payloads.
    PayloadAvailable payload_available = 14;
    // Agent responded to a STATUS_QUERY or proactively emitted a task report.
    TaskReport task_report = 15;
    // Single (timestamp, tokens, limit) sample for one agent's LLM
    // context window. Delivered both during the initial burst (replaying
    // the most recent samples from sqlite) and live as each heartbeat
    // ingests.
    ContextWindowSample context_window_sample = 18;
    // Goldfive orchestration event (plan_submitted / plan_revised /
    // task_started / task_progress / task_completed / task_failed /
    // task_blocked / task_cancelled / drift_detected / run_started /
    // run_completed / run_aborted / goal_derived). Replayed during the
    // initial burst from persisted plans + task state, then streamed
    // live as HarmonografSink ingest fans out deltas on the bus.
    goldfive.v1.Event goldfive_event = 19;
  }
}

message ContextWindowSample {
  string agent_id = 1;
  google.protobuf.Timestamp recorded_at = 2;
  int64 tokens = 3;
  int64 limit_tokens = 4;
}

message InitialBurstComplete {
  int32 spans_sent = 1;
  int32 agents_sent = 2;
}

message NewSpan {
  Span span = 1;
}

message UpdatedSpan {
  string span_id = 1;
  SpanStatus status = 2;
  map<string, AttributeValue> attributes = 3;
  repeated PayloadRef payload_refs = 4;
}

message EndedSpan {
  string span_id = 1;
  google.protobuf.Timestamp end_time = 2;
  SpanStatus status = 3;
  ErrorInfo error = 4;
  // Final payload snapshot — the drawer relies on this to populate the
  // Payload tab metadata (mime/size/summary) without re-fetching the span.
  // See task #7.
  repeated PayloadRef payload_refs = 5;
}

message NewAnnotation {
  Annotation annotation = 1;
}

message AgentJoined {
  Agent agent = 1;
}

message AgentLeft {
  string agent_id = 1;
  string stream_id = 2;
}

message AgentStatusChanged {
  string agent_id = 1;
  AgentStatus status = 2;
  int64 buffered_events = 3;
  int64 dropped_events = 4;
  // One-sentence description of what the agent is currently doing.
  // Sourced from Heartbeat.current_activity and forwarded here so the
  // frontend can display it without waiting for a span update.
  string current_activity = 5;
  // Whether the agent appears stuck: has a RUNNING invocation but
  // progress_counter has not changed for STUCK_THRESHOLD heartbeats.
  bool stuck = 6;
  // The most recent progress_counter value seen from this agent.
  int64 progress_counter = 7;
}

message SessionEnded {
  google.protobuf.Timestamp ended_at = 1;
  SessionStatus final_status = 2;
}

message PayloadAvailable {
  string digest = 1;
}

// Broadcast whenever an agent responds to a STATUS_QUERY control event, or
// proactively emits a task-progress update. Delivered to all WatchSession
// subscribers so the Gantt modal and graph view stay in sync across viewers.
message TaskReport {
  string agent_id = 1;
  // The agent's self-reported description of what it is working on.
  string report = 2;
  // The active invocation span at the time of the report, if known.
  string invocation_span_id = 3;
  // Server wall-clock time when the report was recorded.
  google.protobuf.Timestamp recorded_at = 4;
}

// ---------------------------------------------------------------------------
// GetPayload
// ---------------------------------------------------------------------------

// GetPayload is server-streaming so that large payloads (multi-MiB LLM
// completions, images) can be delivered in chunks and rendered
// progressively in the inspector. Small payloads arrive in one chunk.
message GetPayloadRequest {
  string digest = 1;
  // If true, the server returns only the PayloadRef summary, never the
  // bytes. Used by tooltips that don't need the full body.
  bool summary_only = 2;
}

message PayloadChunk {
  // Echoed on every chunk so the client can correlate interleaved
  // responses (not that GetPayload ever interleaves — defensive).
  string digest = 1;
  int64 total_size = 2;
  string mime = 3;
  // Echoed on the first chunk only; empty on subsequent chunks.
  string summary = 4;
  bytes chunk = 5;
  bool last = 6;
  // If true, the server does not have these bytes (evicted client-side
  // and never reuploaded). The chunk field is empty.
  bool not_found = 7;
}

// ---------------------------------------------------------------------------
// GetSpanTree
// ---------------------------------------------------------------------------

message GetSpanTreeRequest {
  string session_id = 1;
  // Optional: only spans from these agents. Empty = all agents.
  repeated string agent_ids = 2;
  // Optional: time window. Empty start/end = unbounded on that side.
  google.protobuf.Timestamp window_start = 3;
  google.protobuf.Timestamp window_end = 4;
  // Hard cap on returned spans to protect the server. Server may return
  // fewer and set truncated = true in the response.
  int32 limit = 5;
}

message GetSpanTreeResponse {
  repeated Span spans = 1;
  bool truncated = 2;
}

// ---------------------------------------------------------------------------
// PostAnnotation
// ---------------------------------------------------------------------------

// When kind == STEERING or HUMAN_RESPONSE, the server routes the body
// through the control path as a synthetic ControlEvent (STEER or
// APPROVE respectively) and waits for the ack before returning.
// COMMENT annotations return immediately.
message PostAnnotationRequest {
  string session_id = 1;
  AnnotationTarget target = 2;
  AnnotationKind kind = 3;
  string body = 4;
  string author = 5;
  // For steering/human-response: how long to wait for ack. 0 = server
  // default (10s).
  int64 ack_timeout_ms = 6;
}

message PostAnnotationResponse {
  Annotation annotation = 1;
  // For steering/human-response: the ack result from the agent.
  goldfive.v1.ControlAckResult delivery = 2;
  string delivery_detail = 3;
}

// ---------------------------------------------------------------------------
// SendControl
// ---------------------------------------------------------------------------

// Synchronous control issue. Server fans out to every active
// SubscribeControl stream for the target agent and waits for the first
// ack (or aggregates — see detail below). The payload is a fully formed
// goldfive.v1.ControlEvent (typed oneof payload) so the wire contract
// matches what the agent will observe on SubscribeControl — no bytes/JSON
// translation in the server.
message SendControlRequest {
  string session_id = 1;
  goldfive.v1.ControlEvent event = 2;
  // 0 = server default (10s).
  int64 ack_timeout_ms = 3;
  // If true and the agent has multiple concurrent streams, wait for all
  // of them to ack (or timeout). Default (false) returns on the first ack.
  bool require_all_acks = 4;
}

message SendControlResponse {
  string control_id = 1;
  goldfive.v1.ControlAckResult result = 2;
  // Per-stream ack detail when require_all_acks = true; otherwise one
  // entry for the stream that answered first.
  repeated StreamAck acks = 3;
}

message StreamAck {
  string stream_id = 1;
  goldfive.v1.ControlAckResult result = 2;
  string detail = 3;
  google.protobuf.Timestamp acked_at = 4;
}

// ---------------------------------------------------------------------------
// DeleteSession
// ---------------------------------------------------------------------------

message DeleteSessionRequest {
  string session_id = 1;
  // Force delete even if the session is LIVE. Default false — LIVE
  // sessions are refused.
  bool force = 2;
}

message DeleteSessionResponse {
  bool deleted = 1;
  string reason_if_not = 2;
  // Counts of what was removed.
  int32 spans_removed = 3;
  int32 annotations_removed = 4;
  int64 payload_bytes_freed = 5;
}

// ---------------------------------------------------------------------------
// ListInterventions
// ---------------------------------------------------------------------------
//
// Returns the chronological merge of user-initiated, drift-triggered, and
// goldfive-autonomous interventions for one session. Derivable from data
// already on the wire via WatchSession (annotations + goldfive drifts +
// task_plans revision metadata) — this RPC exists so a late-joining
// frontend can fetch the full history without replaying the whole session.
//
// Live updates: WatchSession still streams the underlying deltas
// (initial_annotation, new_annotation, goldfive_event.drift_detected,
// goldfive_event.plan_revised), so the client recomputes the merged list
// incrementally without a second subscribe.
message ListInterventionsRequest {
  string session_id = 1;
}

message ListInterventionsResponse {
  repeated Intervention interventions = 1;
}

// ---------------------------------------------------------------------------
// GetStats
// ---------------------------------------------------------------------------

// Retention stats. Harmonograf v0 does not evict automatically
// (resolved decision F: unlimited retention, show stats). This RPC
// backs the Settings page and is used by the CLI `make stats` target.
message GetStatsRequest {}

message GetStatsResponse {
  int32 session_count = 1;
  int32 live_session_count = 2;
  int32 agent_count = 3;
  int64 span_count = 4;
  int64 annotation_count = 5;
  int64 payload_count = 6;
  int64 payload_bytes = 7;
  int64 disk_bytes = 8;
  string data_dir = 9;
  // Active telemetry streams right now.
  int32 active_telemetry_streams = 10;
  int32 active_control_streams = 11;
}
