name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server-test:
    name: server-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            server/uv.lock
            client/uv.lock

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Vendor google/adk-python
        run: git clone --depth 1 https://github.com/google/adk-python.git third_party/adk-python

      - name: Install server deps
        run: make server-install

      - name: Generate Python proto stubs
        run: make proto-python

      - name: Run server tests
        run: make server-test

  client-test:
    name: client-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            client/uv.lock
            server/uv.lock

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Vendor google/adk-python
        run: git clone --depth 1 https://github.com/google/adk-python.git third_party/adk-python

      - name: Install client deps
        run: make client-install

      - name: Generate Python proto stubs
        run: make proto-python

      - name: Run client tests
        run: make client-test

  frontend-test:
    name: frontend-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend deps
        run: make frontend-install

      - name: Generate TypeScript proto stubs
        run: make proto-ts

      - name: Run frontend tests
        run: make frontend-test
